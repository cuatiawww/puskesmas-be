server {
    listen 8080;
    server_name localhost;
    server_tokens off;

    root /var/www/html;

    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload';
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy "same-origin";
    add_header Permissions-Policy "geolocation=(),midi=(),microphone=(),camera=(),magnetometer=(),gyroscope=(),fullscreen=(self),payment=()";

    ## Block Open Redirect
    set $block_open_redirect 0;
    if ($query_string ~* "(?:redirect_url|redirect|url|next|return|goto|target|redir|destination)=(?:https?:)?//") {
        set $block_open_redirect 1;
    }
    if ($block_open_redirect = 1) { return 403; }

    ## Block XSS
    set $block_xss 0;
    if ($query_string ~* "(<|%3C|%3c).*script.*(>|%3E|%3e)") { set $block_xss 1; }
    if ($query_string ~* "javascript:")                       { set $block_xss 1; }
    if ($query_string ~* "vbscript:")                         { set $block_xss 1; }
    if ($query_string ~* "onload(=|%3D)")                     { set $block_xss 1; }
    if ($query_string ~* "onerror(=|%3D)")                    { set $block_xss 1; }
    if ($query_string ~* "onclick(=|%3D)")                    { set $block_xss 1; }
    if ($query_string ~* "alert(%28|\()")                     { set $block_xss 1; }
    if ($query_string ~* "document\.cookie")                  { set $block_xss 1; }
    if ($query_string ~* "document\.write")                   { set $block_xss 1; }
    if ($block_xss = 1) { return 403; }

    ## Block SQL injection
    set $block_sql 0;
    if ($query_string ~ "union.*select.*\(")  { set $block_sql 1; }
    if ($query_string ~ "union.*all.*select") { set $block_sql 1; }
    if ($query_string ~ "concat.*\(")         { set $block_sql 1; }
    if ($block_sql = 1) { return 403; }

    ## Block file injection
    set $block_file 0;
    if ($query_string ~ "[a-zA-Z0-9_]=http://")    { set $block_file 1; }
    if ($query_string ~ "[a-zA-Z0-9_]=(\.\.//?)+") { set $block_file 1; }
    if ($block_file = 1) { return 403; }

    ## Block common exploits
    set $block_exploit 0;
    if ($query_string ~ "GLOBALS(=|\[|\%[0-9A-Z]{0,2})")      { set $block_exploit 1; }
    if ($query_string ~ "_REQUEST(=|\[|\%[0-9A-Z]{0,2})")     { set $block_exploit 1; }
    if ($query_string ~ "proc/self/environ")                  { set $block_exploit 1; }
    if ($query_string ~ "base64_(en|de)code\(.*\)")           { set $block_exploit 1; }
    if ($block_exploit = 1) { return 403; }

    location / {
        index index.php;
        try_files $uri $uri/ /index.php?$args;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    # Block PHP execution in uploads and asset dirs
    location ~* (^|/)(assets|uploads|app_asset|runtime|runtime_api)/.*\.(php|php5|p7|phtml|pht|ph|ht|sh|pl|py|cgi|asp|aspx)$ {
        return 404;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_buffer_size 256k;
        fastcgi_buffers 8 256k;
        fastcgi_busy_buffers_size 256k;
    }

    location ~ /\.ht {
        deny all;
    }
    location ~ /\.env {
        deny all;
    }
    location ~* /(composer\.json|composer\.lock|package\.json)$ {
        return 404;
        access_log off;
        log_not_found off;
    }
}
